<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Musée FABI — Œuvre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="/res/style/style.css" rel="stylesheet">
  <link href="/res/style/style-info.css" rel="stylesheet">
  <link href="/res/style/style-notes.css" rel="stylesheet">
</head>
<body>

  <!-- HEADER commun -->
  <header id="main-header">
    <div class="logo">
      <a href="/res/common/index.html" style="text-decoration:none;">
        <img src="/res/assets/img/logo/logoFABI_White.svg" alt="Logo Musée FABI">
      </a>
    </div>
    <div class="logo"><h1>Musée FABI</h1></div>
    <nav>
      <ul>
        <li><a href="/res/common/catalogue.html">Catalogue</a></li>
        <li><a href="/res/common/contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- ════════════════════════════════════════
       LAYOUT 1 — ÉDITORIAL (fond clair)
  ════════════════════════════════════════ -->
  <div id="layout-editorial" class="info-layout" hidden>

    <div class="ed-frame-top"></div>
    <div class="ed-frame-bottom"></div>

    <div class="ed-location">
      <span id="ed-museum"></span>
      <div class="ed-location-line"></div>
    </div>

    <div class="ed-year-vert"><span id="ed-year"></span></div>

    <div class="ed-drop-cap-zone">
      <span class="ed-drop-letter" id="ed-drop-letter"></span>
      <span class="ed-drop-rest" id="ed-drop-rest"></span>
    </div>

    <div class="ed-photo-grid">
      <div class="ed-photo-cell ed-photo-top">
        <img id="ed-img1" src="" alt="">
        <img id="ed-img2" src="" alt="">
      </div>
      <div class="ed-photo-cell ed-photo-mid">
        <img id="ed-img3" src="" alt="">
      </div>
      <div class="ed-photo-cell ed-photo-bot">
        <img id="ed-img4" src="" alt="">
      </div>
    </div>

    <div class="ed-text-zone">
      <div class="ed-text-col" id="ed-desc1"></div><br>
      <div class="ed-text-col" id="ed-desc2"></div>
    </div>

    <div class="ed-footer-name">MUSÉE FABI</div>

    <a href="/res/common/catalogue.html" class="info-back-btn">← Retour au catalogue</a>
  </div>


  <!-- ════════════════════════════════════════
       LAYOUT 2 — BAROQUE (fond sombre)
  ════════════════════════════════════════ -->
  <div id="layout-baroque" class="info-layout" hidden>

    <div class="ba-main-img-wrap">
      <img id="ba-main-img" src="" alt="">
    </div>

    <div class="ba-circle-zone">
      <div class="ba-circle-ring"></div>
      <div class="ba-circle-img">
        <img id="ba-circle-img" src="" alt="">
      </div>
      <div class="ba-badge-small">
        <img id="ba-badge-img" src="" alt="">
      </div>
    </div>

    <div class="ba-title-card">
      <p class="ba-style-label" id="ba-style-label"></p>
      <div class="ba-title-ornament"></div>
      <p class="ba-artist" id="ba-artist"></p>
    </div>

    <div class="ba-big-title" id="ba-big-title"></div>

    <div class="ba-info-blocks">
      <div class="ba-info-block">
        <h2 id="ba-block1-title"></h2>
        <p id="ba-block1-text"></p>
      </div>
      <div class="ba-info-block">
        <h2 id="ba-block2-title"></h2>
        <p id="ba-block2-text"></p>
      </div>
      <div class="ba-info-block">
        <h2 id="ba-block3-title"></h2>
        <p id="ba-block3-text"></p>
      </div>
    </div>

    <div class="ba-meta">
      <span id="ba-date"></span>
      <span class="ba-meta-sep">·</span>
      <span id="ba-museum"></span>
    </div>

    <a href="/res/common/catalogue.html" class="info-back-btn ba-back">← Retour au catalogue</a>
  </div>

  <!-- ════════════════════════════════════════
       WIDGET NOTES — hors layout, flux normal
  ════════════════════════════════════════ -->
  <div id="notes-section" hidden>
    <div id="notes-widget-main" class="notes-widget-section"></div>
  </div>

  <!-- État de chargement -->
  <div id="info-loading">
    <p>Chargement de l'œuvre…</p>
  </div>

  <script src="/res/script/script-info.js"></script>
</body>
</html>
