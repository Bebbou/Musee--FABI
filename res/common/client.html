<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace client — Musée FABI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<link href="../style/style.css" rel="stylesheet">
</head>
<body>

<header id="main-header">
  <div class="logo">
    <a href="../index.html" style="text-decoration:none;">
      <img src="../assets/img/logo/logoFABI_White.svg" alt="Logo Musée FABI">
    </a>
  </div>
  <div class="logo"><h1>Musée FABI</h1></div>
  <nav>
    <ul>
      <li><a href="./catalogue.html">Catalogue</a></li>
      <li><a href="./contact.html">Contact</a></li>
    </ul>
  </nav>
  <a href="./client.html" class="header-client-btn active-page">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    Espace client
  </a>
</header>

<div class="client-page">

  <!-- ── VUE AUTH ── -->
  <div class="client-wrap" id="view-auth">

    <p class="client-eyebrow">Musée FABI · Membres</p>
    <h1 class="client-title">Espace client</h1>
    <div class="client-rule"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="connexion">Connexion</button>
      <button class="tab-btn"        data-tab="inscription">Inscription</button>
    </div>

    <!-- Connexion -->
    <div class="tab-panel active" id="panel-connexion">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btn-login">Se connecter</button>
      <div class="form-message" id="msg-login"></div>
    </div>

    <!-- Inscription -->
    <div class="tab-panel" id="panel-inscription">
      <div class="form-row">
        <div class="form-group">
          <label for="reg-nom">Nom</label>
          <input type="text" id="reg-nom" placeholder="Dupont">
        </div>
        <div class="form-group">
          <label for="reg-prenom">Prénom</label>
          <input type="text" id="reg-prenom" placeholder="Marie">
        </div>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label for="reg-password">Mot de passe</label>
        <input type="password" id="reg-password" placeholder="Min. 6 caractères">
      </div>
      <button class="btn-submit" id="btn-register">Créer mon compte</button>
      <div class="form-message" id="msg-register"></div>
    </div>

    <a href="../index.html" class="back-link">Retour à l'accueil</a>

  </div>

  <!-- ── VUE DASHBOARD ── -->
  <div class="client-wrap" id="view-dashboard" style="display:none;">

    <p class="client-eyebrow">Musée FABI · Membres</p>

    <div class="dashboard-avatar" id="dash-avatar"></div>
    <h1 class="client-title" id="dash-name"></h1>
    <p class="dashboard-welcome">Bienvenue dans votre espace personnel</p>

    <div class="client-rule"></div>

    <div class="dashboard-info">
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="dash-email"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Membre depuis</span>
        <span class="info-value" id="dash-since"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Statut</span>
        <span class="info-value info-badge">Membre actif</span>
      </div>
    </div>

    <button class="btn-logout" id="btn-logout">Se déconnecter</button>
    <a href="../index.html" class="back-link">Retour à l'accueil</a>

  </div>

</div>

<script src="../script/client.js"></script>
</body>
</html>
