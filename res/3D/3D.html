<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Musée 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Georgia, serif; }
    canvas { display: block; }
    #hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #e8d5a3; background: rgba(20,15,10,0.8);
      border: 1px solid rgba(200,170,100,0.3);
      padding: 7px 24px; border-radius: 28px; font-size: 14px;
      letter-spacing: 2px; text-transform: uppercase; pointer-events: none;
    }
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 16px; height: 16px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.5);
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    #crosshair::after  { height: 1px; width: 100%; top: 50%; left: 0; }
    #label {
      position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
      color: #f5eacc; background: rgba(15,10,5,0.85);
      border: 1px solid rgba(200,170,100,0.35);
      padding: 8px 20px; border-radius: 5px;
      font-size: 13px; line-height: 1.6; text-align: center;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    #label b { color: #e8d5a3; display: block; }
    #label i { color: #a08050; font-size: 12px; }
    #minimap {
      position: fixed; top: 14px; left: 14px;
      border: 1px solid rgba(200,170,100,0.35); border-radius: 5px;
      pointer-events: none; opacity: 0.82;
    }
    #info {
      position: fixed; top: 16px; right: 16px;
      color: rgba(220,200,150,0.6); font-size: 11px; line-height: 1.9;
      text-align: right; pointer-events: none;
    }
    #click-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #e8d5a3; background: rgba(10,7,3,0.88);
      border: 1px solid rgba(200,170,100,0.4);
      padding: 18px 36px; border-radius: 8px; font-size: 15px;
      letter-spacing: 1px; pointer-events: none; transition: opacity 0.3s;
    }
  </style>
</head>
<body>
<div id="hud">Entrée Centrale</div>
<div id="crosshair"></div>
<div id="label"><b></b><i></i></div>
<canvas id="minimap" width="150" height="150"></canvas>
<div id="info">ZQSD/WASD — déplacement<br>Shift — sprint<br>Clic — capturer</div>
<div id="click-msg">Cliquer pour explorer le musée</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ─── Seeded RNG ───────────────────────────────────────────────────────────────
function mkRng(seed) {
  let s = (seed || 1) >>> 0;
  return () => { s ^= s<<13; s ^= s>>17; s ^= s<<5; return (s>>>0)/4294967296; };
}

// ─── Renderer — perf first ────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);                      // never scale up
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;             // no shadows at all
renderer.toneMapping = THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0b07);
scene.fog = new THREE.Fog(0x0e0b07, 14, 38);   // tighter fog = fewer fragments

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 60);
camera.position.set(0, 1.7, 0);

// ─── Materials — Lambert (no PBR, ~3× faster than Standard) ──────────────────
const M = (col, opts={}) => new THREE.MeshLambertMaterial({ color: col, ...opts });
const MAT = {
  wall:   M(0xe8e2d0),
  floor:  M(0x1e1610),
  ceil:   M(0xddd7c5),
  mould:  M(0xc0a060),
  frame:  M(0x5c4010),
  pedest: M(0x2e2818),
  col:    M(0xccc0a0),
};

// ─── Lighting — minimal: 1 ambient + 1 dir + per-room point ──────────────────
scene.add(new THREE.AmbientLight(0xffe8c8, 0.7));
const sun = new THREE.DirectionalLight(0xfff4d8, 0.5);
sun.position.set(0.5, 1, 0.3); scene.add(sun);

// ─── Constants ────────────────────────────────────────────────────────────────
const WH = 4.5, WT = 0.16, DW = 3, DW4 = 4;

// ─── Wall with gaps ───────────────────────────────────────────────────────────
function wallSegs(len, gaps) {
  const g = new THREE.Group();
  const cuts = gaps.map(o=>[o.c-o.w/2, o.c+o.w/2]).sort((a,b)=>a[0]-b[0]);
  const segs = []; let cur = -len/2;
  for (const [s,e] of cuts) { if (s>cur+0.01) segs.push([cur,s]); cur=e; }
  if (cur < len/2-0.01) segs.push([cur,len/2]);
  for (const [a,b] of segs) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(b-a, WH, WT), MAT.wall);
    m.position.set((a+b)/2, WH/2, 0); g.add(m);
  }
  return g;
}

// ─── Door columns ─────────────────────────────────────────────────────────────
function doorCols(parent, axis, wPos, ctr, dw) {
  const cGeo = new THREE.CylinderGeometry(0.11,0.13,WH,6);
  const capGeo = new THREE.BoxGeometry(0.28,0.1,0.28);
  [-1,1].forEach(s => {
    const col = new THREE.Mesh(cGeo, MAT.col);
    const cap = new THREE.Mesh(capGeo, MAT.col);
    if (axis==='z') {
      col.position.set(ctr+s*(dw/2+0.13), WH/2, wPos);
      cap.position.set(ctr+s*(dw/2+0.13), WH-0.05, wPos);
    } else {
      col.position.set(wPos, WH/2, ctr+s*(dw/2+0.13));
      cap.position.set(wPos, WH-0.05, ctr+s*(dw/2+0.13));
    }
    parent.add(col); parent.add(cap);
  });
}

// ─── Room ─────────────────────────────────────────────────────────────────────
function buildRoom(cx, cz, w, d, name, op={}) {
  const g = new THREE.Group();

  const floorM=new THREE.Mesh(new THREE.BoxGeometry(w,0.2,d),MAT.floor); floorM.position.y=-0.1; g.add(floorM);
  const ceilM=new THREE.Mesh(new THREE.BoxGeometry(w,0.12,d),MAT.ceil); ceilM.position.y=WH+0.06; g.add(ceilM);

  const addWall = (len, gaps, px, pz, ry) => {
    const wg = wallSegs(len, gaps); wg.position.set(px,0,pz); wg.rotation.y=ry; g.add(wg);
    gaps.forEach(o => doorCols(g, ry===0?'z':'x', ry===0?pz:px, o.c, o.w));
  };
  addWall(w, op.N||[], 0, -d/2, 0);
  addWall(w, op.S||[], 0,  d/2, Math.PI);
  addWall(d, op.W||[], -w/2, 0, Math.PI/2);
  addWall(d, op.E||[], w/2,  0, -Math.PI/2);

  // Skirting boards (4 walls)
  [[w, 0.09, 0, -d/2+0.05, 0], [w, 0.09, 0, d/2-0.05, 0],
   [0.09, d, -w/2+0.05, 0, 0], [0.09, d, w/2-0.05, 0, 0]].forEach(([bw,bd,px,pz])=>{
    const sk=new THREE.Mesh(new THREE.BoxGeometry(bw,0.12,bd),MAT.mould);
    sk.position.set(px,0.06,pz); g.add(sk);
  });

  // Lamp (cheap point, no shadow)
  const pt = new THREE.PointLight(0xffe8b0, 1.2, w*2.4+4);
  pt.position.set(0, WH-0.35, 0); g.add(pt);
  const lampMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.14,8,6,0,Math.PI*2,0,Math.PI/2),
    new THREE.MeshBasicMaterial({color:0xffcc44})
  );
  lampMesh.position.set(0,WH-0.18,0); lampMesh.rotation.x=Math.PI; g.add(lampMesh);

  g.position.set(cx,0,cz);
  g._name=name; g._b={cx,cz,hw:w/2-0.28,hd:d/2-0.28};
  scene.add(g); return g;
}

// ─── Corridor ─────────────────────────────────────────────────────────────────
function buildCorridor(cx,cz,w,d) {
  const g = new THREE.Group();
  const cfM=new THREE.Mesh(new THREE.BoxGeometry(w,0.2,d),MAT.floor); cfM.position.y=-0.1; g.add(cfM);
  const ccM=new THREE.Mesh(new THREE.BoxGeometry(w,0.12,d),MAT.ceil); ccM.position.y=WH+0.06; g.add(ccM);
  if (w>=d) {
    [[0,WH/2,-d/2],[0,WH/2,d/2]].forEach(([x,y,z])=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(w,WH,WT),MAT.wall); m.position.set(x,y,z); g.add(m); });
  } else {
    [[-w/2,WH/2,0],[w/2,WH/2,0]].forEach(([x,y,z])=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(WT,WH,d),MAT.wall); m.position.set(x,y,z); g.add(m); });
  }
  const pt=new THREE.PointLight(0xffe8b0,0.6,Math.max(w,d)*2.5);
  pt.position.set(0,WH-0.4,0); g.add(pt);
  g.position.set(cx,0,cz);
  g._b={cx,cz,hw:w/2-0.1,hd:d/2-0.1};
  scene.add(g); return g;
}

// ─── Layout ───────────────────────────────────────────────────────────────────
const rooms = [
  buildRoom( 0,   0,14,14,'Entrée Centrale',   {N:[{c:0,w:DW}],S:[{c:0,w:DW}],E:[{c:0,w:DW}],W:[{c:0,w:DW}]}),
  buildRoom( 0, -22,12,12,'Galerie Nord',       {S:[{c:0,w:DW}]}),
  buildRoom(22,   0,12,12,'Aile Est',           {W:[{c:0,w:DW}]}),
  buildRoom(-22,  0,12,12,'Aile Ouest',         {E:[{c:0,w:DW}]}),
  buildRoom( 0,  22,10,10,'Salle Orientale',    {N:[{c:0,w:DW}],E:[{c:0,w:DW4}]}),
  buildRoom(14,  22,10,10,'Salle Occidentale',  {W:[{c:0,w:DW4}]}),
];
const corrs = [
  buildCorridor( 0,-11,DW, 8), buildCorridor(11, 0, 8,DW),
  buildCorridor(-11, 0, 8,DW), buildCorridor( 0,11,DW, 8),
  buildCorridor( 7,22, 4,DW),
];
const allBounds = [...rooms,...corrs].map(o=>o._b);

// ─── Sculpture ────────────────────────────────────────────────────────────────
function addSculpture(rng, lx, lz, parent) {
  const ph = 0.85+rng()*0.25;
  const ped=new THREE.Mesh(new THREE.BoxGeometry(0.38,ph,0.38),MAT.pedest); ped.position.set(lx,ph/2,lz); parent.add(ped);
  const slab=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.055,0.46),MAT.mould); slab.position.set(lx,ph+0.028,lz); parent.add(slab);
  const t=Math.floor(rng()*4);
  const sculMat = new THREE.MeshLambertMaterial({
    color:new THREE.Color().setHSL(rng(),0.45+rng()*0.25,0.38+rng()*0.18)
  });
  const r0=0.16+rng()*0.06, ch=0.28+rng()*0.18;
  const geos=[
    {g:new THREE.SphereGeometry(r0,8,6),   hy:r0},
    {g:new THREE.TorusGeometry(0.13+rng()*0.05,0.04,8,18), hy:0.1},
    {g:new THREE.ConeGeometry(0.1+rng()*0.05,ch,7),        hy:ch/2},
    {g:new THREE.OctahedronGeometry(0.15+rng()*0.05),      hy:0.16},
  ];
  const sc=new THREE.Mesh(geos[t].g,sculMat);
  sc.position.set(lx, ph+0.06+geos[t].hy, lz);
  sc.rotation.y=rng()*Math.PI*2; parent.add(sc);
}

// ─── Artwork (256px canvas, no spotlight) ────────────────────────────────────
const TITLES=['La Lumière Intérieure','Mélodie Chromatique','Fragments du Temps',
  'Silence Doré','L\'Éveil','Composition en Bleu','La Mémoire des Pierres',
  'Horizon Imaginaire','Nuit Étoilée','Portrait d\'Âme','Variations sur l\'Espace',
  'La Danse des Ombres','Éclats de Lumière','Résonance','Le Souffle du Vent',
  'Contemplation','Formes Primitives','Abstraction No.7','Le Jardin Secret',
  'Vision Nocturne','Harmonie Universelle','Crépuscule','Le Passage',
  'Étude en Rouge','Profondeur','L\'Instant Suspendu','Géographies Intimes'];
const AUTHORS=['M. Durand, 2019','A. Lefebvre, 2021','C. Moreau, 2018',
  'L. Bernard, 2022','P. Petit, 2020','J. Martin, 2023','S. Simon, 2017',
  'R. Laurent, 2021','E. Rousseau, 2016','T. Blanc, 2022','N. Girard, 2019'];

function makeArtwork(idx) {
  const rng=mkRng(idx*7919+1);
  const rf=(a,b)=>rng()*(b-a)+a, ri=(a,b)=>Math.floor(rng()*(b-a+1))+a;
  const W=1.2+rng()*0.9, H=0.85+rng()*0.7;
  const SZ=256, ch=Math.round(SZ*H/W);
  const cnv=document.createElement('canvas'); cnv.width=SZ; cnv.height=ch;
  const ctx=cnv.getContext('2d');

  const h1=ri(0,360),h2=(h1+ri(30,190))%360;
  const bg=ctx.createLinearGradient(0,0,SZ,ch);
  bg.addColorStop(0,`hsl(${h1},${ri(25,68)}%,${ri(12,46)}%)`);
  bg.addColorStop(1,`hsl(${h2},${ri(20,60)}%,${ri(18,60)}%)`);
  ctx.fillStyle=bg; ctx.fillRect(0,0,SZ,ch);

  const style=ri(0,5);
  if (style===0) { for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(rf(0,SZ),rf(0,ch),rf(20,120),0,Math.PI*2);ctx.fillStyle=`hsla(${ri(0,360)},${ri(50,100)}%,${ri(35,72)}%,${rf(0.25,0.55)})`;ctx.fill();}}
  else if (style===1) { for(let i=0;i<12;i++){ctx.save();ctx.translate(rf(0,SZ),rf(0,ch));ctx.rotate(rf(0,Math.PI));const s=rf(22,100);ctx.fillStyle=`hsla(${ri(0,360)},${ri(40,90)}%,${ri(35,70)}%,${rf(0.3,0.6)})`;ctx.fillRect(-s/2,-s/2,s,s);ctx.restore();}}
  else if (style===2) { const sh=ch*(0.4+rf(0,0.2));ctx.fillStyle=`hsl(${ri(185,240)},${ri(30,60)}%,${ri(28,50)}%)`;ctx.fillRect(0,0,SZ,sh);ctx.fillStyle=`hsl(${ri(65,140)},${ri(28,55)}%,${ri(15,35)}%)`;ctx.fillRect(0,sh,SZ,ch);for(let i=0;i<4;i++){ctx.beginPath();const tx=rf(0,SZ),ty=sh*rf(0.4,0.9);ctx.moveTo(tx,ty);ctx.bezierCurveTo(tx+rf(-60,60),ty-rf(25,80),tx+rf(-60,60),ty-rf(15,55),tx+rf(-18,18),ty-rf(60,150));ctx.lineWidth=rf(6,18);ctx.strokeStyle=`hsl(${ri(75,155)},${ri(30,70)}%,${ri(12,42)}%)`;ctx.stroke();}}
  else if (style===3) { for(let i=0;i<500;i++){ctx.beginPath();ctx.arc(rf(0,SZ),rf(0,ch),rf(2,6),0,Math.PI*2);ctx.fillStyle=`hsl(${ri(0,360)},${ri(55,100)}%,${ri(35,70)}%)`;ctx.fill();}}
  else if (style===4) { ctx.fillStyle=`hsl(${ri(18,52)},${ri(25,55)}%,${ri(55,80)}%)`;ctx.fillRect(0,0,SZ,ch);ctx.fillStyle=`hsl(${ri(0,28)},${ri(8,35)}%,${ri(8,22)}%)`;const px=SZ/2,py=ch*0.35;ctx.beginPath();ctx.arc(px,py,SZ*0.18,0,Math.PI*2);ctx.fill();ctx.fillRect(px-SZ*0.14,py+SZ*0.17,SZ*0.28,ch*0.43);}
  else { for(let y=0;y<ch;y+=8){ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=SZ;x+=5)ctx.lineTo(x,y+Math.sin(x/26+y/17)*10);ctx.strokeStyle=`hsla(${ri(0,360)},${ri(45,88)}%,${ri(42,78)}%,0.28)`;ctx.lineWidth=4;ctx.stroke();}}

  const tex=new THREE.CanvasTexture(cnv);
  tex.generateMipmaps=false; tex.minFilter=THREE.LinearFilter; // skip mipmap gen

  const fg=new THREE.Group();
  fg.add(new THREE.Mesh(new THREE.PlaneGeometry(W,H),
    new THREE.MeshLambertMaterial({map:tex})));

  // Frame — 4 bars
  [[0,H/2+0.035,W+0.12,0.065],[0,-H/2-0.035,W+0.12,0.065],
   [-W/2-0.035,0,0.065,H+0.13],[W/2+0.035,0,0.065,H+0.13]].forEach(([x,y,bw,bh])=>{
    const f=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,0.04),MAT.frame);
    f.position.set(x,y,0.018); fg.add(f);
  });

  // Nameplate
  const pl=new THREE.Mesh(new THREE.BoxGeometry(W*0.55,0.085,0.018),
    new THREE.MeshLambertMaterial({color:0xb89038}));
  pl.position.set(0,-H/2-0.12,0.018); fg.add(pl);

  fg._label={title:TITLES[idx%TITLES.length], author:AUTHORS[idx%AUTHORS.length]};
  return fg;
}

// ─── Painting slots per room ──────────────────────────────────────────────────
const SLOTS=[
  {sz:[14,14],s:[{w:'N',a:-4.2},{w:'N',a:4.2},{w:'S',a:-4.2},{w:'S',a:4.2},{w:'E',a:-3.8},{w:'E',a:3.8},{w:'W',a:-3.8},{w:'W',a:3.8}],sc:[[0,0]]},
  {sz:[12,12],s:[{w:'N',a:-3.4},{w:'N',a:0},{w:'N',a:3.4},{w:'E',a:-3},{w:'E',a:3},{w:'W',a:-3},{w:'W',a:3},{w:'S',a:-3.4},{w:'S',a:3.4}],sc:[[-2,0],[2,0]]},
  {sz:[12,12],s:[{w:'N',a:-2.8},{w:'N',a:0},{w:'N',a:2.8},{w:'S',a:-2.8},{w:'S',a:2.8},{w:'E',a:-2.8},{w:'E',a:0},{w:'E',a:2.8},{w:'W',a:-3.4},{w:'W',a:3.4}],sc:[[0,2]]},
  {sz:[12,12],s:[{w:'N',a:-2.8},{w:'N',a:0},{w:'N',a:2.8},{w:'S',a:-2.8},{w:'S',a:2.8},{w:'W',a:-2.8},{w:'W',a:0},{w:'W',a:2.8},{w:'E',a:-3.4},{w:'E',a:3.4}],sc:[[0,-2]]},
  {sz:[10,10],s:[{w:'S',a:-2.6},{w:'S',a:0},{w:'S',a:2.6},{w:'W',a:-2.6},{w:'W',a:2.6},{w:'N',a:-2.8},{w:'N',a:2.8},{w:'E',a:-2.8},{w:'E',a:2.8}],sc:[[0,0]]},
  {sz:[10,10],s:[{w:'N',a:-2.6},{w:'N',a:0},{w:'N',a:2.6},{w:'S',a:-2.6},{w:'S',a:2.6},{w:'E',a:-2.6},{w:'E',a:0},{w:'E',a:2.6},{w:'W',a:-2.8},{w:'W',a:2.8}],sc:[[0,0]]},
];

const artworks=[];
let gIdx=0;
rooms.forEach((room,ri)=>{
  const cfg=SLOTS[ri]; const [rw,rd]=cfg.sz; const Y=WH*0.42; const T=0.12;
  cfg.s.forEach(sl=>{
    const fg=makeArtwork(gIdx++);
    let px=0,pz=0,ry=0;
    if(sl.w==='N'){pz=-rd/2+T;px=sl.a;ry=0;}
    if(sl.w==='S'){pz= rd/2-T;px=sl.a;ry=Math.PI;}
    if(sl.w==='E'){px= rw/2-T;pz=sl.a;ry=-Math.PI/2;}
    if(sl.w==='W'){px=-rw/2+T;pz=sl.a;ry= Math.PI/2;}
    fg.position.set(px,Y,pz); fg.rotation.y=ry;
    room.add(fg);
    artworks.push({fg, wp:new THREE.Vector3(px+room.position.x, Y, pz+room.position.z), label:fg._label});
  });
  const rng=mkRng(ri*31337);
  cfg.sc.forEach(([sx,sz])=>addSculpture(rng,sx,sz,room));
});

// ─── Collision / room detection ───────────────────────────────────────────────
function inZone(x,z){for(const b of allBounds)if(Math.abs(x-b.cx)<b.hw&&Math.abs(z-b.cz)<b.hd)return true;return false;}
function roomName(x,z){for(const r of rooms){const b=r._b;if(Math.abs(x-b.cx)<b.hw&&Math.abs(z-b.cz)<b.hd)return r._name;}return '';}

// ─── Controls ─────────────────────────────────────────────────────────────────
const euler=new THREE.Euler(0,0,0,'YXZ');
let locked=false;
const clickMsg=document.getElementById('click-msg');
renderer.domElement.addEventListener('click',()=>renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===renderer.domElement;
  clickMsg.style.opacity=locked?'0':'1';
});
document.addEventListener('mousemove',e=>{
  if(!locked)return;
  euler.y-=e.movementX*0.0018;
  euler.x=Math.max(-1.4,Math.min(1.4,euler.x-e.movementY*0.0018));
  camera.quaternion.setFromEuler(euler);
});
const keys={};
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',  e=>keys[e.code]=false);

// ─── Mini-map ─────────────────────────────────────────────────────────────────
const mm=document.getElementById('minimap');
const mc=mm.getContext('2d');
const MS=150, SC=2.4, OX=MS/2, OZ=MS/2;
const tmm=(wx,wz)=>[OX+wx*SC, OZ+wz*SC];

function drawMap(){
  mc.fillStyle='rgba(8,6,3,0.9)'; mc.fillRect(0,0,MS,MS);
  const rect=(cx,cz,hw,hd,fill)=>{
    const [x,z]=tmm(cx-hw,cz-hd);
    mc.fillStyle=fill; mc.fillRect(x,z,hw*2*SC,hd*2*SC);
    mc.strokeStyle='rgba(180,145,55,0.45)'; mc.lineWidth=0.7; mc.strokeRect(x,z,hw*2*SC,hd*2*SC);
  };
  corrs.forEach(c=>rect(c._b.cx,c._b.cz,c._b.hw+0.1,c._b.hd+0.1,'rgba(50,40,20,0.9)'));
  rooms.forEach((r,i)=>rect(r._b.cx,r._b.cz,r._b.hw+0.28,r._b.hd+0.28,i===0?'rgba(80,62,22,0.95)':'rgba(62,48,18,0.9)'));

  const [px,pz]=tmm(camera.position.x,camera.position.z);
  const fx=Math.sin(euler.y)*-4, fz=Math.cos(euler.y)*-4;
  mc.beginPath(); mc.moveTo(px,pz); mc.lineTo(px+fx,pz+fz);
  mc.strokeStyle='rgba(240,200,80,0.55)'; mc.lineWidth=1.4; mc.stroke();
  mc.beginPath(); mc.arc(px,pz,3.2,0,Math.PI*2);
  mc.fillStyle='#f0c030'; mc.fill();
}

// ─── Label ────────────────────────────────────────────────────────────────────
const labelEl=document.getElementById('label');
const lTitle=labelEl.querySelector('b');
const lAuth=labelEl.querySelector('i');
const PROX=3.0;
function updateLabel(){
  let near=null,md=PROX;
  for(const aw of artworks){const d=camera.position.distanceTo(aw.wp);if(d<md){md=d;near=aw;}}
  if(near){lTitle.textContent=near.label.title;lAuth.textContent=near.label.author;labelEl.style.opacity='1';}
  else labelEl.style.opacity='0';
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
const hud=document.getElementById('hud');
const dir=new THREE.Vector3();
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const spd=(keys['ShiftLeft']||keys['ShiftRight'])?9:5;

  dir.set(0,0,0);
  if(keys['KeyW']||keys['ArrowUp']   ||keys['KeyZ'])dir.z-=1;
  if(keys['KeyS']||keys['ArrowDown'])                dir.z+=1;
  if(keys['KeyA']||keys['ArrowLeft'] ||keys['KeyQ'])dir.x-=1;
  if(keys['KeyD']||keys['ArrowRight'])               dir.x+=1;

  if(dir.lengthSq()>0){
    dir.normalize().applyEuler(new THREE.Euler(0,euler.y,0));
    const nx=camera.position.x+dir.x*spd*dt;
    const nz=camera.position.z+dir.z*spd*dt;
    if(inZone(nx,camera.position.z))camera.position.x=nx;
    if(inZone(camera.position.x,nz))camera.position.z=nz;
  }
  camera.position.y=1.7;

  hud.textContent=roomName(camera.position.x,camera.position.z)||'Couloir';
  updateLabel();
  drawMap();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
