<script>
const VENUS_GLB = 'model_sculpture/Venus_de_milos.glb';
const NIKE_GLB = 'model_sculpture/Victoire_de_samothrace.glb';

const DISCO_GLB = 'model_sculpture/discobolus.glb';
const JULIUS_GLB = 'model_sculpture/buste_jules_cesar.glb';
const PSYCHE_GLB = 'model_sculpture/psyche_revived_by_cupid.glb';

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const _dracoLoader = new DRACOLoader();
_dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/');
const _gltfLoader = new GLTFLoader();
_gltfLoader.setDRACOLoader(_dracoLoader);

// ─── Seeded RNG ───────────────────────────────────────────────────────────────
function mkRng(seed) {
  let s = (seed || 1) >>> 0;
  return () => { s ^= s<<13; s ^= s>>17; s ^= s<<5; return (s>>>0)/4294967296; };
}

// ─── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0b07);
scene.fog = new THREE.Fog(0x0e0b07, 14, 40);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 60);
camera.position.set(0, 1.7, 0);

// ─── Materials ────────────────────────────────────────────────────────────────
const M = col => new THREE.MeshLambertMaterial({ color: col });
const MAT = {
  wall:   M(0xe8e2d0), floor: M(0x1e1610), ceil:  M(0xddd7c5),
  mould:  M(0xc0a060), frame: M(0x5c4010), pedest:M(0x2e2818), col: M(0xccc0a0),
};

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffe8c8, 0.7));
const sun = new THREE.DirectionalLight(0xfff4d8, 0.5);
sun.position.set(0.5, 1, 0.3);
scene.add(sun);

// ─── Constants ────────────────────────────────────────────────────────────────
const WH = 4.5, WT = 0.16;

// ─── Wall with door gaps ──────────────────────────────────────────────────────
// gaps: [{c: center_along_wall, w: width}]
function wallSegs(len, gaps) {
  const g = new THREE.Group();
  const cuts = gaps.map(o => [o.c - o.w/2, o.c + o.w/2]).sort((a,b) => a[0]-b[0]);
  const segs = []; let cur = -len/2;
  for (const [s,e] of cuts) { if (s > cur+0.01) segs.push([cur, s]); cur = e; }
  if (cur < len/2 - 0.01) segs.push([cur, len/2]);
  for (const [a,b] of segs) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(b-a, WH, WT), MAT.wall);
    m.position.set((a+b)/2, WH/2, 0);
    g.add(m);
  }
  return g;
}

// ─── Door columns ─────────────────────────────────────────────────────────────
function doorCols(parent, axis, wPos, ctr, dw) {
  const cGeo   = new THREE.CylinderGeometry(0.11, 0.13, WH, 6);
  const capGeo = new THREE.BoxGeometry(0.28, 0.1, 0.28);
  [-1, 1].forEach(s => {
    const col = new THREE.Mesh(cGeo, MAT.col);
    const cap = new THREE.Mesh(capGeo, MAT.col);
    const offset = ctr + s * (dw/2 + 0.13);
    if (axis === 'z') { col.position.set(offset, WH/2, wPos); cap.position.set(offset, WH-0.05, wPos); }
    else              { col.position.set(wPos, WH/2, offset); cap.position.set(wPos, WH-0.05, offset); }
    parent.add(col); parent.add(cap);
  });
}

// ─── Room builder ─────────────────────────────────────────────────────────────
// op: { N, S, E, W } each an array of {c, w} door gaps
function buildRoom(cx, cz, w, d, name, op = {}) {
  const g = new THREE.Group();

  // Floor & ceiling
  const fl = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), MAT.floor);
  fl.position.y = -0.1; g.add(fl);
  const ce = new THREE.Mesh(new THREE.BoxGeometry(w, 0.12, d), MAT.ceil);
  ce.position.y = WH + 0.06; g.add(ce);

  // Four walls with gaps
  const addWall = (len, gaps, px, pz, ry) => {
    const wg = wallSegs(len, gaps);
    wg.position.set(px, 0, pz); wg.rotation.y = ry; g.add(wg);
    // columns: axis depends on which wall
    const axis = (ry === 0 || Math.abs(ry) === Math.PI) ? 'z' : 'x';
    const wallPos = (axis === 'z') ? pz : px;
    gaps.forEach(o => doorCols(g, axis, wallPos, o.c, o.w));
  };
  addWall(w, op.N||[], 0,    -d/2, 0);
  addWall(w, op.S||[], 0,     d/2, Math.PI);
  addWall(d, op.W||[], -w/2,  0,   Math.PI/2);
  addWall(d, op.E||[], w/2,   0,  -Math.PI/2);

  // Skirting boards
  [
    [w,    0.09, 0,     -d/2+0.05],
    [w,    0.09, 0,      d/2-0.05],
    [0.09, d,   -w/2+0.05, 0     ],
    [0.09, d,    w/2-0.05, 0     ],
  ].forEach(([bw, bd, px, pz]) => {
    const sk = new THREE.Mesh(new THREE.BoxGeometry(bw, 0.12, bd), MAT.mould);
    sk.position.set(px, 0.06, pz); g.add(sk);
  });

  // Point light + lamp mesh
  const pt = new THREE.PointLight(0xffe8b0, 1.2, w*2.4+4);
  pt.position.set(0, WH-0.35, 0); g.add(pt);
  const lm = new THREE.Mesh(
    new THREE.SphereGeometry(0.14, 8, 6, 0, Math.PI*2, 0, Math.PI/2),
    new THREE.MeshBasicMaterial({ color: 0xffcc44 })
  );
  lm.position.set(0, WH-0.18, 0); lm.rotation.x = Math.PI; g.add(lm);

  g.position.set(cx, 0, cz);
  g._name = name;
  // nav bounds: exact half-extents, no margin
  g._nav = { xmin: cx-w/2, xmax: cx+w/2, zmin: cz-d/2, zmax: cz+d/2 };
  scene.add(g);
  return g;
}

// ─── Corridor builder ─────────────────────────────────────────────────────────
function buildCorridor(cx, cz, w, d) {
  const g = new THREE.Group();
  const fl = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), MAT.floor);
  fl.position.y = -0.1; g.add(fl);
  const ce = new THREE.Mesh(new THREE.BoxGeometry(w, 0.12, d), MAT.ceil);
  ce.position.y = WH+0.06; g.add(ce);

  // Side walls (along the long axis)
  if (w >= d) { // runs along X → walls along Z
    [d/2, -d/2].forEach(pz => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, WH, WT), MAT.wall);
      m.position.set(0, WH/2, pz); g.add(m);
    });
  } else {      // runs along Z → walls along X
    [w/2, -w/2].forEach(px => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(WT, WH, d), MAT.wall);
      m.position.set(px, WH/2, 0); g.add(m);
    });
  }
  const pt = new THREE.PointLight(0xffe8b0, 0.7, Math.max(w,d)*2.5);
  pt.position.set(0, WH-0.4, 0); g.add(pt);

  g.position.set(cx, 0, cz);
  // nav bounds: exact half-extents
  g._nav = { xmin: cx-w/2, xmax: cx+w/2, zmin: cz-d/2, zmax: cz+d/2 };
  scene.add(g);
  return g;
}

// ─── Layout ───────────────────────────────────────────────────────────────────
//
// Room world positions and wall coordinates:
//   R0 (0,    0)  14×14  → N:z=-7   S:z=+7   W:x=-7   E:x=+7
//   R1 (0,  -22)  12×12  → S:z=-16  (south face, adjacent to R0.N)
//   R2 (22,   0)  12×12  → W:x=+16  (west  face, adjacent to R0.E)
//   R3 (-22,  0)  12×12  → E:x=-16  (east  face, adjacent to R0.W)
//   R4 (0,   22)  10×10  → N:z=+17  E:x=+5
//   R5 (14,  22)  10×10  → W:x=+9
//
// Each corridor cx/cz = midpoint between the two facing walls,
// w/d = exact gap distance between them.
//   R0.N(z=-7)  ↔ R1.S(z=-16) : cz=(-7-16)/2=-11.5  d=9
//   R0.S(z=+7)  ↔ R4.N(z=+17) : cz=(7+17)/2=+12     d=10
//   R0.E(x=+7)  ↔ R2.W(x=+16) : cx=(7+16)/2=+11.5   w=9
//   R0.W(x=-7)  ↔ R3.E(x=-16) : cx=(-7-16)/2=-11.5  w=9
//   R4.E(x=+5)  ↔ R5.W(x=+9)  : cx=(5+9)/2=+7       w=4

const DW = 3, DW4 = 4;   // doorway widths

// ─── Panneau numéroté ─────────────────────────────────────────────────────────
function addRoomSign(room, num, name, [px, pz], ry) {
  const W = 512, H = 192;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Fond
  ctx.fillStyle = '#110e07';
  ctx.fillRect(0, 0, W, H);

  // Bordure dorée
  ctx.strokeStyle = '#c8a030';
  ctx.lineWidth = 5;
  ctx.strokeRect(6, 6, W-12, H-12);
  ctx.lineWidth = 1.5;
  ctx.strokeRect(14, 14, W-28, H-28);

  // Numéro
  ctx.fillStyle = '#e8c84a';
  ctx.font = 'bold 88px Georgia';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num, W * 0.18, H * 0.52);

  // Séparateur vertical
  ctx.strokeStyle = '#c8a030';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W*0.32, 28); ctx.lineTo(W*0.32, H-28); ctx.stroke();

  // Nom de la salle
  ctx.fillStyle = '#f0e0b0';
  ctx.font = '28px Georgia';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  // Découpe le nom si trop long
  const words = name.split(' ');
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > W * 0.60) { lines.push(line); line = w; }
    else line = test;
  }
  lines.push(line);
  const lineH = 36, startY = H/2 - (lines.length-1)*lineH/2;
  lines.forEach((l, i) => ctx.fillText(l, W*0.36, startY + i*lineH));

  const tex = new THREE.CanvasTexture(cv);
  tex.generateMipmaps = false;
  tex.minFilter = THREE.LinearFilter;

  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 0.6),
    new THREE.MeshLambertMaterial({ map: tex })
  );
  sign.position.set(px, WH * 0.84, pz);
  sign.rotation.y = ry;
  room.add(sign);
}

const rooms = [
  buildRoom(  0,    0, 14, 14, 'Classicisme',
    { N:[{c:0,w:DW}], S:[{c:0,w:DW}], E:[{c:0,w:DW}], W:[{c:0,w:DW}] }),
  buildRoom(  0,  -22, 12, 12, 'Impressionnisme',    { S:[{c:0,w:DW}] }),
  buildRoom( 22,    0, 12, 12, 'Baroque',        { W:[{c:0,w:DW}] }),
  buildRoom(-22,    0, 12, 12, 'Renaissance',      { E:[{c:0,w:DW}] }),
  buildRoom(  0,   22, 10, 10, 'Romantisme',       { N:[{c:0,w:DW}], E:[{c:0,w:DW4}] }),
  buildRoom( 14,   22, 10, 10, 'Art Moderne',     { W:[{c:0,w:DW4}] }),
];

// Panneaux — au-dessus de l'entrée de chaque salle, face au visiteur qui entre
// R0 (14×14) : toutes directions, panneau côté sud (vers R4)
addRoomSign(rooms[0], '1', 'Classicisme',  [ 0,    +6.88],  Math.PI);    // mur sud, face nord (vers l'intérieur)
// R1 (12×12) : entrée par le sud (corridor depuis R0)
addRoomSign(rooms[1], '2', 'Impressionnisme',     [ 0,    +5.88],  Math.PI);    // mur sud, face nord
// R2 (12×12) : entrée par l'ouest (corridor depuis R0)
addRoomSign(rooms[2], '3', 'Baroque',         [-5.88,  0   ],  Math.PI/2);  // mur ouest, face est
// R3 (12×12) : entrée par l'est (corridor depuis R0)
addRoomSign(rooms[3], '4', 'Renaissance',       [+5.88,  0   ], -Math.PI/2); // mur est, face ouest
// R4 (10×10) : entrée par le nord (corridor depuis R0)
addRoomSign(rooms[4], '5', 'Romantisme',  [ 0,    -4.88],  0);          // mur nord, face sud
// R5 (10×10) : entrée par l'ouest (depuis R4)
addRoomSign(rooms[5], '6', 'Art Moderne',[-4.88,  0   ],  Math.PI/2);  // mur ouest, face est

const corrs = [
  buildCorridor(   0, -11.5, DW,   9),   // R0 ↔ R1
  buildCorridor(   0,  12,   DW,  10),   // R0 ↔ R4
  buildCorridor( 11.5,  0,    9,  DW),   // R0 ↔ R2
  buildCorridor(-11.5,  0,    9,  DW),   // R0 ↔ R3
  buildCorridor(   7,  22,    4,  DW4),  // R4 ↔ R5
];

// ─── Navigation zones (flat list of AABB min/max) ─────────────────────────────
// All rooms + corridors combined. No margins — exact wall positions.
const NAV_ZONES = [...rooms, ...corrs].map(o => o._nav);

// Point-in-zone test (raw)
function inZone(x, z) {
  for (const n of NAV_ZONES)
    if (x >= n.xmin && x <= n.xmax && z >= n.zmin && z <= n.zmax) return true;
  return false;
}

// Collision avec rayon joueur : on teste le centre + 8 points sur un cercle de rayon R.
// Si l'un des points sort de toute zone, le déplacement est refusé.
const PLAYER_R = 0.28;
function canMoveTo(x, z) {
  if (!inZone(x, z)) return false;
  const R = PLAYER_R, r = R * 0.707;
  return inZone(x-R, z  ) && inZone(x+R, z  ) &&
         inZone(x,   z-R) && inZone(x,   z+R) &&
         inZone(x-r, z-r) && inZone(x+r, z-r) &&
         inZone(x-r, z+r) && inZone(x+r, z+r);
}

function currentRoom(x, z) {
  for (const r of rooms)
    if (x >= r._nav.xmin && x <= r._nav.xmax && z >= r._nav.zmin && z <= r._nav.zmax)
      return r._name;
  return '';
}

// ─── Sculpture ────────────────────────────────────────────────────────────────
function addSculpture(rng, lx, lz, parent) {
  const ph = 0.85 + rng()*0.25;
  const ped = new THREE.Mesh(new THREE.BoxGeometry(0.38, ph, 0.38), MAT.pedest);
  ped.position.set(lx, ph/2, lz); parent.add(ped);
  const slab = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.055, 0.46), MAT.mould);
  slab.position.set(lx, ph+0.028, lz); parent.add(slab);
  const t = Math.floor(rng()*4);
  const sculMat = new THREE.MeshLambertMaterial({
    color: new THREE.Color().setHSL(rng(), 0.45+rng()*0.25, 0.38+rng()*0.18)
  });
  const r0 = 0.16+rng()*0.06, ch = 0.28+rng()*0.18;
  const geos = [
    { g: new THREE.SphereGeometry(r0, 8, 6),                   hy: r0   },
    { g: new THREE.TorusGeometry(0.13+rng()*0.05, 0.04, 8, 18),hy: 0.1  },

  ];
  const sc = new THREE.Mesh(geos[t].g, sculMat);
  sc.position.set(lx, ph+0.06+geos[t].hy, lz);
  sc.rotation.y = rng()*Math.PI*2;
  parent.add(sc);
}

function makeArtwork(painting) {
  const W = 1.25, H = 0.95;
  const mat = new THREE.MeshLambertMaterial({ color: 0x1a1410 });
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(W, H), mat);

  new THREE.TextureLoader().load(
    `../img/peintures/${painting.id}.webp`,
    tex => {
      tex.generateMipmaps = false;
      tex.minFilter = THREE.LinearFilter;
      mat.map = tex;
      mat.color.set(0xffffff);
      mat.needsUpdate = true;
    }
  );

  const fg = new THREE.Group();
  fg.add(plane);

  [[0,H/2+0.035,W+0.12,0.065],[0,-H/2-0.035,W+0.12,0.065],
   [-W/2-0.035,0,0.065,H+0.13],[W/2+0.035,0,0.065,H+0.13]].forEach(([x,y,bw,bh]) => {

    new THREE.MeshLambertMaterial({ color: 0xb89038 }));
  pl.position.set(0,-H/2-0.12,0.018); fg.add(pl);

  fg._label = { title: painting.title, author: painting.author };
  return fg;
}

// ─── Streaming system (charge/décharge selon distance) ────────────────────────
const _streams = [];
function registerLazy(center3, glbPath, room, buildFn, loadD = 18, unloadD = 26) {
  _streams.push({ center: center3, glbPath, room, buildFn, loadD, unloadD, model: null, loading: false });
}
function _dispose3D(obj) {
  obj.traverse(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) [].concat(c.material).forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
  });
}
function checkLazyLoaders() {
  const p = camera.position;
  for (const s of _streams) {
    const d = p.distanceTo(s.center);
    if (!s.model && !s.loading && d < s.loadD) {
      s.loading = true;
      _gltfLoader.load(s.glbPath, gltf => {
        s.loading = false;
        if (p.distanceTo(s.center) > s.unloadD) return;
        s.model = s.buildFn(gltf.scene);
        s.room.add(s.model);
      }, null, e => { s.loading = false; console.error(s.glbPath, e); });
    } else if (s.model && d > s.unloadD) {
      s.room.remove(s.model);
      _dispose3D(s.model);
      s.model = null;
    }
  }
}

registerLazy(
  new THREE.Vector3(0, 0, 0), VENUS_GLB, venusRoom,
  (scene) => {
    const model = scene;

    // 1. Calcul de la box réelle (avec les transforms des nodes enfants GLB)
    const tmpBox = new THREE.Box3();
    model.traverse(child => {
      if (child.isMesh && child.geometry) {
        child.updateWorldMatrix(true, false);
        const geomBox = new THREE.Box3().setFromBufferAttribute(child.geometry.attributes.position);
        geomBox.applyMatrix4(child.matrixWorld);
        tmpBox.union(geomBox);
      }
    });
    const rawH = tmpBox.getSize(new THREE.Vector3()).y || 1;
    model.scale.setScalar(1.85 / rawH);

    // 2. Recalcul de la box APRÈS scale pour un centrage exact
    model.updateMatrixWorld(true);
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x, PED_TOP - box.min.y, -center.z);

    // Teinte ivoire + éclairage Lambert (cohérent avec le reste du musée)
    model.traverse(child => {
      if (!child.isMesh) return;
      const m = child.material;
      if (!m) return;
      if (!m.map) m.color.set(0xf2e8d8);
      m.roughness = 0.45;
      m.metalness = 0;
    });

    return model;
  },
  100, 200
);

const juliusRoom = rooms[3]; // (-22, 0)

juliusBase.position.y = J_BASE_H / 2;

registerLazy(
  new THREE.Vector3(-22, 0, 0), JULIUS_GLB, juliusRoom,
  (scene) => {
    const model = scene;
    const tmpBox = new THREE.Box3();
    model.traverse(child => {
      if (child.isMesh && child.geometry) {
        child.updateWorldMatrix(true, false);
        const geomBox = new THREE.Box3().setFromBufferAttribute(child.geometry.attributes.position);
        geomBox.applyMatrix4(child.matrixWorld);
        tmpBox.union(geomBox);
      }
    });
    const rawH = tmpBox.getSize(new THREE.Vector3()).y || 1;
    model.scale.setScalar(0.90 / rawH);
    model.updateMatrixWorld(true);
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x, J_PED_TOP - box.min.y - 0.45, -center.z);
    model.traverse(child => {
      if (!child.isMesh) return;
      const m = child.material;
      if (!m) return;
      if (!m.map) m.color.set(0xe8d8c0);
      m.roughness = 0.55; m.metalness = 0;
    });
    return model;
  }
);

// ─── Controls ─────────────────────────────────────────────────────────────────
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
let locked = false;
const clickMsg    = document.getElementById('click-msg');
const pauseOverlay = document.getElementById('pause-overlay');
const pauseResume  = document.getElementById('pause-resume');

function enterVisite() { renderer.domElement.requestPointerLock(); }
function showPause()   { pauseOverlay.classList.add('visible');    clickMsg.style.opacity = '0'; }
function hidePause()   { pauseOverlay.classList.remove('visible'); }

renderer.domElement.addEventListener('click', () => {
  if (!pauseOverlay.classList.contains('visible')) enterVisite();
});
pauseOverlay.addEventListener('click', e => {
  if (e.target === pauseOverlay || e.target === document.getElementById('pause-body'))
    enterVisite();
});
pauseResume.addEventListener('click', enterVisite);

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  if (locked) { hidePause(); }
  else        { showPause(); }
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  euler.y -= e.movementX * 0.0018;
  euler.x = Math.max(-1.4, Math.min(1.4, euler.x - e.movementY*0.0018));
  camera.quaternion.setFromEuler(euler);
});
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

// ─── Mini-map ─────────────────────────────────────────────────────────────────
const mm = document.getElementById('minimap');
const mc = mm.getContext('2d');
const MS=150, SC=2.2, OX=MS/2, OZ=MS/2;
const tmm = (wx,wz) => [OX + wx*SC, OZ + wz*SC];

function drawMap() {
  mc.fillStyle = 'rgba(8,6,3,0.9)'; mc.fillRect(0,0,MS,MS);
  const rect = (xmin,zmin,xmax,zmax, fill) => {
    const [x,z] = tmm(xmin, zmin);
    mc.fillStyle = fill; mc.fillRect(x, z, (xmax-xmin)*SC, (zmax-zmin)*SC);
    mc.strokeStyle = 'rgba(180,145,55,0.4)'; mc.lineWidth = 0.7;
    mc.strokeRect(x, z, (xmax-xmin)*SC, (zmax-zmin)*SC);
  };
  corrs.forEach(c => rect(c._nav.xmin, c._nav.zmin, c._nav.xmax, c._nav.zmax, 'rgba(50,40,20,0.9)'));
  rooms.forEach((r,i) => {
    rect(r._nav.xmin, r._nav.zmin, r._nav.xmax, r._nav.zmax,
      i===0 ? 'rgba(80,62,22,0.95)' : 'rgba(62,48,18,0.9)');
    // Numéro au centre de la salle
    const [cx, cz] = tmm((r._nav.xmin+r._nav.xmax)/2, (r._nav.zmin+r._nav.zmax)/2);
    mc.fillStyle = 'rgba(232,200,80,0.9)';
    mc.font = 'bold 11px Georgia';
    mc.textAlign = 'center';
    mc.textBaseline = 'middle';
    mc.fillText(i + 1, cx, cz);
  });

  const [px,pz] = tmm(camera.position.x, camera.position.z);
  const fx = Math.sin(euler.y)*-4, fz = Math.cos(euler.y)*-4;
  mc.beginPath(); mc.moveTo(px,pz); mc.lineTo(px+fx, pz+fz);
  mc.strokeStyle = 'rgba(240,200,80,0.6)'; mc.lineWidth = 1.5; mc.stroke();
  mc.beginPath(); mc.arc(px, pz, 3.2, 0, Math.PI*2);
  mc.fillStyle = '#f0c030'; mc.fill();
}

// ─── Proximity label ──────────────────────────────────────────────────────────
const labelEl = document.getElementById('label');
const lTitle = labelEl.querySelector('b');
const lAuth  = labelEl.querySelector('i');

function updateLabel() {
  let near = null, md = 3.0;
  for (const aw of artworks) {
    const d = camera.position.distanceTo(aw.wp);
    if (d < md) { md = d; near = aw; }
  }
  if (near) { lTitle.textContent = near.label.title; lAuth.textContent = near.label.author; labelEl.style.opacity = '1'; }
  else labelEl.style.opacity = '0';
}

// ─── Game loop ────────────────────────────────────────────────────────────────
const hud   = document.getElementById('hud');
const dir   = new THREE.Vector3();
const clock = new THREE.Clock();
const moveEuler = new THREE.Euler();

function animate() {
  requestAnimationFrame(animate);
  const dt  = Math.min(clock.getDelta(), 0.05);
  const spd = (keys['ShiftLeft']||keys['ShiftRight']) ? 9 : 5;

  dir.set(0, 0, 0);
  if (keys['KeyW']||keys['ArrowUp']   ||keys['KeyZ']) dir.z -= 1;
  if (keys['KeyS']||keys['ArrowDown'])                dir.z += 1;
  if (keys['KeyA']||keys['ArrowLeft'] ||keys['KeyQ']) dir.x -= 1;
  if (keys['KeyD']||keys['ArrowRight'])               dir.x += 1;

  if (dir.lengthSq() > 0) {
    moveEuler.set(0, euler.y, 0);
    dir.normalize().applyEuler(moveEuler);
    const nx = camera.position.x + dir.x * spd * dt;
    const nz = camera.position.z + dir.z * spd * dt;
    if (canMoveTo(nx, camera.position.z)) camera.position.x = nx;
    if (canMoveTo(camera.position.x, nz)) camera.position.z = nz;
  }
  camera.position.y = 1.7;

  hud.textContent = currentRoom(camera.position.x, camera.position.z) || 'Couloir';
  updateLabel();
  drawMap();
  checkLazyLoaders();
  for (let ri = 0; ri < rooms.length; ri++) {
    const rc = rooms[ri].position;
    const vis = camera.position.distanceTo(new THREE.Vector3(rc.x, 0, rc.z)) < 22;
    for (const fg of roomArt[ri]) fg.visible = vis;
  }
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
